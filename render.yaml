databases:
  - name: clinicadb
    databaseName: clinicadb
    user: clinica
    plan: free

services:
  # ===== Backend: Spring Boot (Docker) =====
  - type: web
    name: clinica-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: clinicadb
          property: host
      - key: DB_PORT
        fromDatabase:
          name: clinicadb
          property: port
      - key: DB_NAME
        fromDatabase:
          name: clinicadb
          property: database
      - key: DB_USER
        fromDatabase:
          name: clinicadb
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: clinicadb
          property: password

  # ===== Frontend: React/Vite (Static Site) =====
  - type: web
    name: clinica-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      # Injeta o host público do backend
      - key: VITE_API_URL
        fromService:
          type: web
          name: clinica-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

