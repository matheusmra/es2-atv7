name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger VPS Webhook
        run: |
          if [ -z "${{ secrets.VPS_WEBHOOK_URL }}" ]; then
            echo "Error: VPS_WEBHOOK_URL secret is not set."
            exit 1
          fi
          echo "Triggering VPS deployment..."
          curl -sS -L -X GET "${{ secrets.VPS_WEBHOOK_URL }}"
          echo "Deployment triggered successfully!"
